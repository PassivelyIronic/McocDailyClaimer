name: Daily Claim Automation

on:
  schedule:
    # Uruchamia się codziennie o 9:00 rano czasu UTC (czyli 10:00/11:00 w Polsce)
    - cron: '0 9 * * *'
  workflow_dispatch: # Ta linijka dodaje magiczny przycisk "Run workflow" na GitHubie do ręcznego testowania

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja środowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Uruchomienie skryptu
      env:
        # Tutaj GitHub wstrzykuje Twoje tajne hasła w bezpieczny sposób
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: python main.py