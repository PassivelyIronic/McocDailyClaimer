name: Daily Claim Automation

on:
  schedule:
    # 18:05 UTC to 20:05 poland (summer time) i 19:05 poland (winter time)
    - cron: '5 18 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja środowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Uruchomienie skryptu
      env:
        # secrets injection
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: python main.py